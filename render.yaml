services:
  - type: web
    name: find-yourself-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ALLOW_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN.vercel.app
      - key: EXPOSE_API_DOCS
        value: false
