<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbfbfd" />
    <title>Find Yourself · 让求职更清楚</title>
    <meta name="description" content="Find Yourself 是一款 AI 求职伴侣，帮你先看清自己，再看清岗位，最后把行动做出来。" />
    <link rel="stylesheet" href="/static/styles.css?v=2026-05-01-chatfix" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主内容</a>
    <header class="nav-shell">
      <nav class="nav wrap" aria-label="主导航">
        <div class="nav-brand"><span class="nav-logo" aria-hidden="true"></span><span class="nav-title">Find Yourself</span></div>
        <div class="nav-actions">
        </div>
      </nav>
    </header>

    <main id="main" class="wrap main-layout page-shell">
      <section class="hero-shell hero-intro panel">
        <div class="hero-copy">
          <span class="module-tag">AI 求职伴侣</span>
          <h1>先看清自己，再看清岗位，最后把行动做出来。</h1>
          <p class="hero-text">
            Find Yourself 不是一个单纯的简历工具，而是一个帮助你整理困惑、理解方向、分析岗位、优化表达，并持续推进求职行动的陪伴式产品。
          </p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="/settings" id="btnHeroStart">立即开始</a>
          </div>
        </div>

        <div class="hero-visual hero-visual--copy" aria-hidden="true">
          <div class="orb orb-a"></div>
          <div class="orb orb-b"></div>
          <div class="orb orb-c"></div>
          <div class="floating-card card-one">
            <span class="floating-dot"></span>
            <strong>看清方向</strong>
            <small>从焦虑到清楚</small>
          </div>
          <div class="floating-card card-two">
            <span class="floating-dot mint"></span>
            <strong>理解差距</strong>
            <small>从感觉到依据</small>
          </div>
          <div class="floating-card card-three">
            <span class="floating-dot sky"></span>
            <strong>持续行动</strong>
            <small>从建议到执行</small>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
