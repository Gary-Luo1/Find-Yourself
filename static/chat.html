<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbfbfd" />
    <title>Find Yourself · 聊聊</title>
    <link rel="stylesheet" href="/static/styles.css?v=2026-05-01-chatfix" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主内容</a>
    <header class="nav-shell">
      <nav class="nav wrap" aria-label="主导航">
        <a class="nav-brand" href="/" aria-label="返回首页"><span class="nav-logo" aria-hidden="true"></span><span class="nav-title">Find Yourself</span></a>
        <div class="nav-actions" role="tablist" aria-label="流程导航">
          <a class="nav-tab" data-step="chat" href="/chat.html">聊聊</a>
          <a class="nav-tab" data-step="resume" href="/resume.html">简历输入</a>
          <a class="nav-tab" data-step="analyze" href="/analyze.html">分析与优化</a>
          <a class="nav-tab" data-step="journey" href="/journey.html">行动与复盘</a>
        </div>
      </nav>
    </header>

    <main id="main" class="wrap main-layout page-shell">
      <section class="panel module-card module-highlight full-width module-anchor chat-shell" id="chat-module">
        <div class="module-title-row chat-title-row">
          <div>
            <span class="module-tag alt">需求交流</span>
            <h1 class="section-heading">先把话说清楚</h1>
            <p class="module-lead">你可以直接说困惑、目标和限制。系统会边聊边记住你，慢慢形成更熟悉你的求职伴侣。</p>
          </div>
        </div>

        <div class="chat-frame chat-frame--minimal">
          <section class="chat-panel chat-panel--minimal">
            <div class="chat-topline">
              <div class="chat-topline__brand">
                <span class="profile-avatar profile-avatar--assistant" aria-hidden="true">FY</span>
                <div>
                  <div class="profile-name">Find Yourself</div>
                  <div class="profile-subtitle">正在和你对话</div>
                </div>
              </div>
              <div id="chatTyping" class="chat-typing is-hidden">正在输入中…</div>
            </div>
            <div class="chat-toolbar" aria-label="对话操作">
              <button type="button" class="chat-toolbar__link" id="btnChatHistory">翻阅记录</button>
              <button type="button" class="chat-toolbar__link" id="btnChatJumpLatest">回到最新</button>
              <button type="button" class="chat-toolbar__link danger" id="btnChatClear">清空对话</button>
            </div>
            <div id="chatStatus" class="chat-status">在下方输入内容后按回车或点击发送。</div>
            <div id="chatThread" class="chat-thread" aria-live="polite"></div>
            <form id="chatForm" class="chat-form">
              <label class="field chat-input-field">
                <span class="field-label">聊聊你的求职困惑</span>
                <textarea id="chatInput" rows="3" placeholder="比如：我不知道适合做产品、运营还是数据分析；也不知道下一步先做什么。"></textarea>
              </label>
              <div class="chat-compose-actions">
                <button type="submit" class="btn btn-primary btn-priority" id="btnChatSend">发送</button>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <dialog id="dlgSettings" class="modal"><form method="dialog" class="modal-card"><h2 class="modal-title">模型设置</h2><p class="modal-lead">当前版本已将模型配置固定在后端，不再需要前端填写。</p><div class="result-summary">如果后续要调整模型参数，请直接修改服务端 `.env` 配置。</div><div class="modal-actions"><button type="button" class="btn btn-primary" id="btnSaveSettings">知道了</button></div></form></dialog>
    <dialog id="dlgMemory" class="modal"><form method="dialog" class="modal-card"><h2 class="modal-title">编辑我的求职画像</h2><p class="modal-lead">你可以补充、修改或清除系统记住的关键信息。</p><label class="field"><span class="field-label">已知稳定信息</span><textarea id="memoryStableFacts" rows="4"></textarea></label><label class="field"><span class="field-label">偏好 / 倾向</span><textarea id="memoryPreferences" rows="4"></textarea></label><label class="field"><span class="field-label">待确认问题</span><textarea id="memoryOpenQuestions" rows="4"></textarea></label><label class="field"><span class="field-label">画像摘要</span><textarea id="memorySummaryInput" rows="3"></textarea></label><div class="modal-actions"><button type="button" class="btn btn-secondary" id="btnMemoryClear">仅清空内容</button><button type="button" class="btn btn-primary" id="btnMemorySave">保存画像</button></div></form></dialog>
    <dialog id="dlgEmotion" class="modal"><form method="dialog" class="modal-card"><h2 class="modal-title">说说心情</h2><p class="modal-lead">这里是一个安全的情绪出口。</p><label class="field"><span class="field-label">现在最想说的话</span><textarea id="emotionInput" rows="6"></textarea></label><label class="field"><span class="field-label">我想让系统记住的感受</span><textarea id="emotionTakeaway" rows="3"></textarea></label><div class="modal-actions"><button type="button" class="btn btn-secondary" id="btnEmotionClear">清空内容</button><button type="button" class="btn btn-primary" id="btnEmotionSave">记录并关掉</button></div></form></dialog>
    <script src="/static/app-state.js?v=2026-05-01-chatfix"></script><script src="/static/app-main.js?v=2026-05-01-chatfix"></script><script src="/static/app-helpers.js?v=2026-05-01-chatfix"></script><script src="/static/app-render.js?v=2026-05-01-chatfix"></script><script src="/static/app-api.js?v=2026-05-01-chatfix"></script><script src="/static/app-flow.js?v=2026-05-01-chatfix"></script><script src="/static/app.js?v=2026-05-01-chatfix"></script><script src="/static/app-init.js?v=2026-05-01-chatfix"></script>
  </body>
</html>
