<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbfbfd" />
    <title>Find Yourself · 陪记</title>
    <link rel="stylesheet" href="/static/styles.css?v=2026-05-03-journey-table" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主内容</a>
    <header class="nav-shell">
      <nav class="nav wrap" aria-label="主导航">
        <a class="nav-brand" href="/" aria-label="返回首页"><span class="nav-logo" aria-hidden="true"></span><span class="nav-title">Find Yourself</span></a>
        <div class="nav-actions" role="tablist" aria-label="流程导航">
          <a class="nav-tab" data-step="chat" href="/chat.html">陪聊</a>
          <a class="nav-tab" data-step="resume" href="/resume.html">陪看</a>
          <a class="nav-tab" data-step="analyze" href="/analyze.html">陪想</a>
          <a class="nav-tab" data-step="journey" href="/journey.html">陪记</a>
        </div>
      </nav>
    </header>

    <main id="main" class="wrap main-layout page-shell">
      <section class="panel module-card module-highlight full-width module-anchor" id="journey-module">
        <div class="module-title-row">
          <div>
            <span class="module-tag alt">步骤 5</span>
            <h1 class="section-heading">求职旅程记录表</h1>
            <p class="module-lead">按岗位维度记录投递与面试进展，统一管理你的求职流水。</p>
          </div>
        </div>

        <div id="status" class="result-summary" aria-live="polite"></div>

        <section class="journey-stat-grid" id="journeyStats" aria-label="求职统计"></section>

        <div class="journey-toolbar">
          <label class="field"><span class="field-label">搜索</span><input id="journeySearch" type="text" placeholder="岗位 / 公司 / 备注 / 链接" /></label>
          <label class="field"><span class="field-label">状态</span>
            <select id="journeyFilterStatus">
              <option value="">全部状态</option>
              <option value="已投递">已投递</option>
              <option value="筛选中">筛选中</option>
              <option value="约面试">约面试</option>
              <option value="面试中">面试中</option>
              <option value="已通过">已通过</option>
              <option value="已拒绝">已拒绝</option>
              <option value="已入职">已入职</option>
            </select>
          </label>
          <label class="field"><span class="field-label">公司</span><input id="journeyFilterCompany" type="text" placeholder="输入公司关键词" /></label>
        </div>

        <div class="journey-form-shell">
          <div class="journey-form-grid">
            <label class="field"><span class="field-label">岗位链接</span><input id="journeyJobLink" type="url" placeholder="https://..." /></label>
            <label class="field"><span class="field-label">岗位名称</span><input id="journeyJobTitle" type="text" placeholder="例如：高级产品经理" /></label>
            <label class="field"><span class="field-label">公司名称</span><input id="journeyCompany" type="text" placeholder="例如：某某科技" /></label>
            <label class="field journey-date-center"><span class="field-label">投递时间</span><input id="journeyApplyDate" type="date" /></label>
            <label class="field"><span class="field-label">面试轮次</span><input id="journeyRound" type="text" placeholder="例如：一面 / 二面 / HR面 / 终面" /></label>
            <label class="field"><span class="field-label">当前状态</span><select id="journeyStatus"><option value="已投递">已投递</option><option value="筛选中">筛选中</option><option value="约面试">约面试</option><option value="面试中">面试中</option><option value="已通过">已通过</option><option value="已拒绝">已拒绝</option><option value="已入职">已入职</option></select></label>
            <label class="field journey-span-2"><span class="field-label">备注</span><input id="journeyNote" type="text" placeholder="例如：下周二晚 7 点一面" /></label>
            <div class="journey-actions journey-span-2">
              <button type="button" class="btn btn-primary" id="btnJourneyAdd">新增记录</button>
              <button type="button" class="btn btn-ghost" id="btnJourneyClear">清空全部记录</button>
            </div>
          </div>
        </div>

        <section class="feature-card" style="margin-top:12px;">
          <div class="feature-output" style="min-height:0;">
            <table class="journey-table" id="journeyTable">
              <thead>
                <tr>
                  <th>岗位名称</th>
                  <th>公司名称</th>
                  <th>岗位链接</th>
                  <th>投递时间</th>
                  <th>面试轮次</th>
                  <th>当前状态</th>
                  <th>备注</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="journeyTableBody"></tbody>
            </table>
          </div>
        </section>

        <div class="journey-bottom-bar">
          <button type="button" class="btn btn-secondary" id="btnJourneyExport">导出表格</button>
          <button type="button" class="btn btn-secondary" id="btnJourneyFilterClear">清空筛选</button>
        </div>
      </section>
    </main>

    <script src="/static/app-modules.js?v=2026-05-03-opt"></script><script src="/static/app-state.js?v=2026-05-03-journey-table"></script><script src="/static/app-main.js?v=2026-05-03-opt"></script><script src="/static/app-helpers.js?v=2026-05-03-journey-table"></script><script src="/static/app-render.js?v=2026-05-03-journey-table"></script><script src="/static/app-api.js?v=2026-05-03-journey-table"></script><script src="/static/app-flow.js?v=2026-05-03-opt"></script><script src="/static/app.js?v=2026-05-03-opt"></script><script src="/static/app-journey.js?v=2026-05-03-journey-table"></script><script src="/static/app-init.js?v=2026-05-03-opt"></script><script src="/static/app-entry.js?v=2026-05-03-journey-table"></script>
  </body>
</html>
